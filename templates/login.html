<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #1a1a2e;
            color: #eaeaea;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #16213e;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #2a2a4a;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #eaeaea;
        }

        p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #eaeaea;
            font-size: 1rem;
            margin-bottom: 14px;
            outline: none;
        }

        input:focus {
            border-color: #5e60ce;
        }

        button {
            width: 100%;
            padding: 13px;
            background: #5e60ce;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 10px;
            transition: background 0.2s;
        }

        button:hover {
            background: #4849a3;
        }

        .secondary {
            background: transparent;
            border: 1px solid #5e60ce;
            color: #5e60ce;
        }

        .secondary:hover {
            background: #5e60ce;
            color: white;
        }

        .message {
            text-align: center;
            margin-top: 14px;
            font-size: 0.9rem;
            color: #e05c5c;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>👋 Welcome back</h1>
        <p>Login to see your tasks</p>

        <input type="text" id="username" placeholder="Username"/>
        <input type="password" id="password" placeholder="Password"/>

        <button onclick="login()">Login</button>
        <button class="secondary" onclick="register()">Create Account</button>

        <div class="message" id="message"></div>
    </div>

    <script>
        function login() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            fetch("/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username, password})
            })
            .then(res => res.json())
            .then(data => {
                if(data.error) {
                    document.getElementById("message").textContent = data.error;
                } else {
                    window.location.href = "/";
                }
            });
        }

        function register() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            fetch("/register", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username, password})
            })
            .then(res => res.json())
            .then(data => {
                if(data.error) {
                    document.getElementById("message").textContent = data.error;
                } else {
                    document.getElementById("message").style.color = "#4caf50";
                    document.getElementById("message").textContent = "Account created! Please login.";
                }
            });
        }
    </script>
</body>
</html>
